// ── CONFIG ─────────────────────────────────────────────────────────────────
const W=900, H=650;
const svg = d3.select('#msv').attr('viewBox',`0 0 ${W} ${H}`).attr('width','100%');
const wrap = document.getElementById('wrap');
const tip  = document.getElementById('tip');

const projection = d3.geoMercator().center([-95,34]).scale(710).translate([W/2, H/2+10]);
const pathGen = d3.geoPath().projection(projection);
const proj = (lo,la) => projection([lo,la]);

const MIN_K=1, MAX_K=14;
let currentK = 1;

const zoom = d3.zoom()
  .scaleExtent([MIN_K, MAX_K])
  .translateExtent([[-180,-60],[W+180,H+100]])
  .on('zoom', onZoom);

svg.call(zoom);
svg.append('rect').attr('width',W).attr('height',H).attr('fill','#0d1b2e').attr('rx',8);
const gMap = svg.append('g').attr('id','gmap');

function showTip(e,html){
  tip.innerHTML=html; tip.style.display='block';
  const r=wrap.getBoundingClientRect();
  let x=e.clientX-r.left+14, y=e.clientY-r.top-10;
  if(x+245>r.width) x=e.clientX-r.left-248;
  tip.style.left=x+'px'; tip.style.top=Math.max(4,y)+'px';
}
function hideTip(){ tip.style.display='none'; }

// Build a label-offset layout per host city
// offsets: array of {dx,dy} for each camp slot around the host
function ringOffsets(n, baseR){
  const offsets=[];
  for(let i=0;i<n;i++){
    const angle = (i/n)*2*Math.PI - Math.PI/2;
    offsets.push({dx:Math.cos(angle)*baseR, dy:Math.sin(angle)*baseR});
  }
  return offsets;
}

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
  const countries = topojson.feature(world, world.objects.countries);

  // Country colors: Canada = red tint, USA = blue tint, Mexico = green tint
  const colorMap = {
    '840':'#1a3358',   // USA – dark blue
    '484':'#173320',   // Mexico – dark green
    '124':'#4a1020',   // Canada – dark red
  };

  gMap.selectAll('path.land')
    .data(countries.features)
    .join('path').attr('class','land')
    .attr('d',pathGen)
    .attr('fill',d=>colorMap[String(d.id)]||'#1c2333')
    .attr('stroke','#334155').attr('stroke-width',0.5);

  // ── LINES ─────────────────────────────────────────────────────────────
  CAMPS.forEach(tc=>{
    const p1=proj(tc.lo,tc.la), p2=proj(tc.hlo,tc.hla);
    if(!p1||!p2||isNaN(p1[0])||isNaN(p2[0])) return;
    if(Math.hypot(p2[0]-p1[0],p2[1]-p1[1])<5) return;
    gMap.append('line')
      .attr('x1',p1[0]).attr('y1',p1[1]).attr('x2',p2[0]).attr('y2',p2[1])
      .attr('stroke','#4b6080').attr('stroke-width',0.8)
      .attr('stroke-dasharray','4,3').attr('opacity',0.45);
  });

  // ── CAMP MARKERS & LABELS ─────────────────────────────────────────────
  // Group camps by host city to distribute labels around host
  const campsByHost = {};
  CAMPS.forEach(tc=>{
    const key = `${tc.hlo},${tc.hla}`;
    if(!campsByHost[key]) campsByHost[key]=[];
    campsByHost[key].push(tc);
  });

  CAMPS.forEach(tc=>{
    const p=proj(tc.lo,tc.la);
    if(!p||isNaN(p[0])) return;
    const cg = gMap.append('g').datum(tc).attr('class','camp-g')
      .attr('transform',`translate(${p[0]},${p[1]})`).attr('cursor','pointer')
      .on('mousemove',e=>showTip(e,
        `<strong style="font-size:13px">${tc.t}</strong>
         <span style="background:#166534;color:#fff;border-radius:3px;padding:1px 6px;font-size:10px;margin-left:4px">Grupo ${tc.g}</span><br>
         <b style="font-size:11px">${tc.s}</b><br>
         <span style="font-size:11px;color:#94a3b8">${tc.c}</span>`))
      .on('mouseleave',hideTip);

    cg.append('circle').attr('class','camp-circ').attr('r',5.5)
      .attr('fill','#166534').attr('stroke','#4ade80').attr('stroke-width',1.1);
    cg.append('text').attr('class','camp-emoji')
      .attr('text-anchor','middle').attr('dominant-baseline','central')
      .attr('font-size',6.5).attr('fill','#fff').attr('pointer-events','none').text('⚽');

    // Labels appear at zoom ≥ 2.5, positioned to avoid overlap
    const lg = cg.append('g').attr('class','camp-label').attr('display','none');
    // Determine label side based on position relative to host
    const hp=proj(tc.hlo,tc.hla);
    const dx=p[0]-hp[0], dy=p[1]-hp[1];
    const dist=Math.hypot(dx,dy);
    let lx=8, ly=-4, anchor='start';
    if(dist>3){
      // place label away from host
      const nx=dx/Math.max(dist,1), ny=dy/Math.max(dist,1);
      lx=nx*14+6; ly=ny*14-4;
      anchor = nx<-0.2?'end':'start';
    }
    lg.append('text').attr('x',lx).attr('y',ly)
      .attr('text-anchor',anchor).attr('font-size',7.5)
      .attr('fill','#a5f3fc').attr('font-weight','500').text(tc.t);
    lg.append('text').attr('x',lx).attr('y',ly+9)
      .attr('text-anchor',anchor).attr('font-size',6.5)
      .attr('fill','#7dd3fc').text(`Gr.${tc.g} · ${tc.c}`);
  });

  // ── HOST MARKERS & LABELS ─────────────────────────────────────────────
  HOST.forEach(hc=>{
    const p=proj(hc.lo,hc.la);
    if(!p||isNaN(p[0])) return;

    const hg = gMap.append('g').datum(hc).attr('class','host-g')
      .attr('transform',`translate(${p[0]},${p[1]})`).attr('cursor','pointer')
      .on('mousemove',e=>showTip(e,
        `<strong style="font-size:13px">${hc.n}</strong><br>
         <span style="color:#94a3b8;font-size:12px">${hc.s}</span><br>
         <span style="font-size:11px;color:${hc.note.includes('Final')?'#f59e0b':'#94a3b8'}">${hc.note}</span>`))
      .on('mouseleave',hideTip);

    hg.append('rect').attr('class','host-rect')
      .attr('x',-9).attr('y',-9).attr('width',18).attr('height',18).attr('rx',3)
      .attr('fill','#534AB7').attr('stroke','#a5b4fc').attr('stroke-width',1.3);
    hg.append('text').attr('class','host-emoji')
      .attr('text-anchor','middle').attr('dominant-baseline','central')
      .attr('font-size',11).attr('pointer-events','none').text('🏟');

    // Smart label placement
    const westSet=new Set(['Los Ángeles','San Francisco','Seattle','Vancouver']);
    const anchor=westSet.has(hc.n)?'end':'start';
    const lx=westSet.has(hc.n)?-12:12;
    let ly=-3;
    if(hc.n==='Houston') ly=9;
    if(hc.n==='Monterrey') ly=10;
    if(hc.n==='Miami') ly=-14;
    if(hc.n==='Dallas') ly=-12;

    const lg=hg.append('g').attr('class','host-label');
    lg.append('text').attr('x',lx).attr('y',ly)
      .attr('text-anchor',anchor).attr('font-size',9.5).attr('font-weight','700')
      .attr('fill','#f1f5f9').text(hc.n);
    lg.append('text').attr('x',lx).attr('y',ly+11)
      .attr('text-anchor',anchor).attr('font-size',7.5).attr('fill','#94a3b8').text(hc.s);
    if(hc.note.includes('Final')){
      lg.append('text').attr('x',lx).attr('y',ly+22)
        .attr('text-anchor',anchor).attr('font-size',8).attr('fill','#f59e0b').text('⭐ Final 19 Jul');
    }
  });

  // ── COUNTRY LABELS ────────────────────────────────────────────────────
  // Canada label — inside Canadian territory (around Manitoba/Ontario)
  gMap.append('text').attr('class','country-label').attr('x',310).attr('y',70)
    .attr('text-anchor','middle').attr('font-size',16).attr('font-weight','300')
    .attr('fill','rgba(255,120,100,0.22)').attr('letter-spacing',5)
    .attr('pointer-events','none').text('C  A  N  A  D  Á');

  // Mexico label — Chihuahua/Sonora area
  gMap.append('text').attr('class','country-label').attr('x',320).attr('y',425)
    .attr('text-anchor','middle').attr('font-size',13).attr('font-weight','300')
    .attr('fill','rgba(100,220,100,0.20)').attr('letter-spacing',4)
    .attr('pointer-events','none').text('M É X I C O');

  // USA label
  gMap.append('text').attr('class','country-label').attr('x',370).attr('y',170)
    .attr('text-anchor','middle').attr('font-size',16).attr('font-weight','300')
    .attr('fill','rgba(100,160,255,0.15)').attr('letter-spacing',5)
    .attr('pointer-events','none').text('E S T A D O S   U N I D O S');

  // ── LEGEND BOXES (country colors) ────────────────────────────────────
  const legItems = [

  legItems.forEach((l,i)=>{
    svg.append('rect').attr('x',14).attr('y',12+i*18).attr('width',13).attr('height',13)
      .attr('rx',2).attr('fill',l.c).attr('stroke',l.border).attr('stroke-width',0.8);
    svg.append('text').attr('x',31).attr('y',22+i*18).attr('font-size',10.5)
      .attr('fill','rgba(255,255,255,0.65)').text(l.label);
  });

  // ── TITLE BLOCK ───────────────────────────────────────────────────────
  // Title
  svg.append('text').attr('x',W/2).attr('y',18)
    .attr('text-anchor','middle').attr('font-size',13.5).attr('font-weight','700')
    .attr('fill','rgba(255,255,255,0.88)')
    .text('FIFA World Cup 2026™ — Norteamérica · Sedes y Bases de Entrenamiento');

  // Author
  svg.append('text').attr('x',W/2).attr('y',33)
    .attr('text-anchor','middle').attr('font-size',10).attr('font-weight','400')
    .attr('fill','rgba(165,180,202,0.75)')
    .text('Por Rodolfo Gerardo Ortiz Morales');

  // Made with Claude
  svg.append('text').attr('x',W/2).attr('y',46)
    .attr('text-anchor','middle').attr('font-size',9).attr('font-style','italic')
    .attr('fill','rgba(124,145,175,0.60)')

  // Data source
  svg.append('text').attr('x',W/2).attr('y',H-6)
    .attr('text-anchor','middle').attr('font-size',8.5)
    .attr('fill','rgba(100,120,150,0.70)')
    .text('Fuente de datos: FIFA.com/es/tournaments/mens/worldcup/canadamexicousa2026 · inside.fifa.com · © FIFA 2026');

}).catch(e=>{
  svg.append('text').attr('x',20).attr('y',40).attr('fill','#aaa').text('Error: '+e.message);
});

// ── ZOOM HANDLER ──────────────────────────────────────────────────────────
function onZoom(event){
  const t=event.transform;
  gMap.attr('transform',t);
  currentK=t.k;
  document.getElementById('zlbl').textContent='Zoom: '+currentK.toFixed(1)+'×';

  const ms=Math.max(0.35, 1/Math.sqrt(currentK));

  // Scale camp markers
  gMap.selectAll('.camp-g').each(function(){
    const g=d3.select(this);
    g.select('.camp-circ').attr('r',5.5*ms);
    g.select('.camp-emoji').attr('font-size',6.5*ms);
  });

  // Scale host markers
  gMap.selectAll('.host-g').each(function(){
    const g=d3.select(this);
    const sz=18*ms;
    g.select('.host-rect').attr('x',-sz/2).attr('y',-sz/2).attr('width',sz).attr('height',sz).attr('rx',3*ms);
    g.select('.host-emoji').attr('font-size',11*ms);
  });

  // Scale host labels inversely
  gMap.selectAll('.host-label').each(function(){
    d3.select(this).selectAll('text').style('font-size', function(){
      const base=parseFloat(d3.select(this).attr('font-size')||9);
      return (base*ms)+'px';
    });
  });

  // Camp labels: show at zoom ≥ 2.5
  gMap.selectAll('.camp-label').attr('display', currentK>=2.5?'block':'none');
  if(currentK>=2.5){
    gMap.selectAll('.camp-label').each(function(){
      d3.select(this).selectAll('text').style('font-size', function(){
        const base=parseFloat(d3.select(this).attr('font-size')||7);
        return Math.max(5,base*ms)+'px';
      });
    });
  }

  // Scale country labels inversely so they stay readable but subtle
  gMap.selectAll('.country-label')
    .attr('font-size', function(){
      const base=this.id==='can'?16:13;
      return Math.max(8, (this.getAttribute('font-size')||14)*ms);
    });
}

// ── BUTTONS ───────────────────────────────────────────────────────────────
document.getElementById('zin').onclick  = ()=>svg.transition().duration(280).call(zoom.scaleBy,1.7);
document.getElementById('zout').onclick = ()=>svg.transition().duration(280).call(zoom.scaleBy,1/1.7);
document.getElementById('rstbtn').onclick = ()=>svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity);
</script>
